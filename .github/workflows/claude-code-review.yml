name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Please review this pull request. Focus on:
            - Correctness and logic errors
            - Security issues (injection, auth gaps, hardcoded secrets)
            - Python/FastAPI best practices
            - Anything that deviates from the existing code style

            Be concise. Flag blockers as ❌, suggestions as ⚠️, and positives as ✅.
